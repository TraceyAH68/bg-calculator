<!DOCTYPE html>
<html>
<head>
<title>BG Calculator</title>
</head>

<body>

<h1>BG Lifestyle Calculator</h1>

<label>Signups</label>
<input id="signups" type="number" value="10">

<label>% $100</label>
<input id="p100" type="number" value="40">

<label>% $250</label>
<input id="p250" type="number" value="30">

<label>% $500</label>
<input id="p500" type="number" value="20">

<label>% $1000</label>
<input id="p1000" type="number" value="10">

<label>Duplication (0–1)</label>
<input id="dup" type="number" value="0.5">

<h2>Results</h2>
<p id="income"></p>
<p id="cycles"></p>
<p id="alpha"></p>

<script>
function calc() {

let s = +document.getElementById("signups").value;

let p100 = +document.getElementById("p100").value/100;
let p250 = +document.getElementById("p250").value/100;
let p500 = +document.getElementById("p500").value/100;
let p1000 = +document.getElementById("p1000").value/100;

let dup = +document.getElementById("dup").value;

let income =
(s*p100*23) +
(s*p250*33) +
(s*p500*66) +
(s*p1000*133);

let cycles = (s*dup)/2;
let alpha = cycles/3;

document.getElementById("income").innerText = "$"+income.toFixed(2);
document.getElementById("cycles").innerText = cycles.toFixed(2);
document.getElementById("alpha").innerText = alpha.toFixed(2);

}

document.querySelectorAll("input").forEach(i =>
i.addEventListener("input", calc)
);

calc();
</script>

</body>
</html>
